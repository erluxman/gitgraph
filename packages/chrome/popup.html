<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>gitGraph</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        margin: 0;
        padding: 16px;
        width: 360px;
      }
      h1 { margin: 0 0 12px; font-size: 14px; }
      h2 {
        margin: 16px 0 6px;
        font-size: 12px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
      }
      label { display: block; font-size: 12px; margin: 10px 0 4px; color: #9ca3af; }
      input[type=text],
      input[type=password],
      select,
      textarea {
        width: 100%;
        padding: 6px 8px;
        background: #111827;
        color: #e5e7eb;
        border: 1px solid #1f2937;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 12px;
      }
      textarea { height: 50px; resize: vertical; }
      .row { display: flex; gap: 8px; align-items: center; }
      button {
        padding: 6px 12px;
        background: #1e40af;
        color: #fff;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
      }
      button:disabled { background: #374151; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        border: 1px solid #374151;
        color: #e5e7eb;
      }
      .status {
        margin-top: 8px;
        font-size: 11px;
        color: #4ade80;
        min-height: 14px;
      }
      .status.error { color: #fca5a5; }
      .hint { font-size: 11px; color: #6b7280; margin-top: 2px; }
      hr { border: 0; border-top: 1px solid #1f2937; margin: 16px 0 4px; }
      details summary {
        cursor: pointer;
        font-size: 12px;
        color: #9ca3af;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>gitGraph</h1>

    <h2>Compare branches</h2>
    <div id="compare-hint" class="hint">
      Detecting current repo…
    </div>
    <label for="base-branch">Base branch</label>
    <select id="base-branch" disabled>
      <option value="">(loading…)</option>
    </select>
    <label for="head-branch">Compare branch <span style="color:#6b7280;">(optional — leave blank for snapshot)</span></label>
    <select id="head-branch" disabled>
      <option value="">(loading…)</option>
    </select>
    <div class="row" style="margin-top:12px;">
      <button id="open-graph" type="button" disabled>Open graph in current tab</button>
      <button id="reload-branches" type="button" class="secondary">Reload</button>
    </div>
    <div class="status" id="compare-status"></div>

    <hr />

    <details open>
      <summary>Settings</summary>
      <label for="token">GitHub personal access token (optional)</label>
      <input id="token" type="password" placeholder="ghp_…" autocomplete="off" />

      <label for="mode">Scan mode</label>
      <select id="mode">
        <option value="auto">Auto (deep when token set, else light)</option>
        <option value="light">Light (fast, partial graph)</option>
        <option value="deep">Deep (slow, complete graph)</option>
      </select>

      <label for="excludes">Additional exclude globs (one per line)</label>
      <textarea id="excludes" placeholder="scripts/**&#10;docs/**"></textarea>

      <button id="save" type="button" style="margin-top:12px;">Save settings</button>
      <div class="status" id="settings-status"></div>
    </details>

    <script src="popup.js"></script>
  </body>
</html>
